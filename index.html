{key:"energy",label:"Energy",icon:"\u26A1",intro:"Energy lives in four domains: mental, physical, emotional, and alignment (the felt sense that your energy is going where it matters). When one collapses, the others compensate until they can\u2019t.",questions:[

{name:"Curiosity",description:"The starting point. Noticing what\u2019s actually happening without judgment. Looking at what\u2019s running your equation before trying to change it.",actions:{
chosen:{

_default:{critical:"Something is running your equation without your permission. You already know what it is. Name it. Out loud. That\u2019s the first act of curiosity. Seeing what\u2019s actually happening.",depleted:"You can see some of what\u2019s running your equation, but the picture is still incomplete. Pick one variable this week. Energy, attention, or time. Just watch it. Don\u2019t optimize. Observe. The pattern will show itself.",resourced:"You have good visibility into your equation. The curiosity practice now is staying honest. What habit have you stopped questioning because it\u2019s comfortable?"}

const ALL_Q=SECTIONS.flatMap(s=>s.questions.map(q=>({...q,section:s})));
const totalQ=ALL_Q.length;

function scoreColor(s){return s<=3?C.red:s<=6?C.amber:C.green}
function scoreLabel(s){return s<=2?"Critical":s<=4?"Depleted":s<=6?"Stretched":s<=8?"Resourced":"Thriving"}
function spreadInsight(sp,dim,low){const n=SECTIONS.find(s=>s.key===dim)?.label||dim;if(sp<=1.5){if(low<=4)return"All three dimensions are running low. This is systemic depletion. The whole system needs tending. When everything is equally drained, the intervention is rest and reconnection before strategy.";if(low<=6)return"Your capacity is stretched evenly across all three dimensions. There\u2019s no single point of collapse, but there\u2019s also no reserve. You\u2019re managing, but the margin is thin. Small disruptions hit harder from here.";return"Your three dimensions are holding steady. That\u2019s a stable foundation. The work from here is about protecting what you\u2019ve built and deepening the habits that sustain it.";}if(sp<=4)return"Your "+n.toLowerCase()+" is the constraint. The other dimensions are compensating for it right now, and that compensation has a cost. This is where the pattern becomes visible. When you address "+n.toLowerCase()+" specifically, the whole equation shifts.";return"Your "+n.toLowerCase()+" has collapsed while the rest of your system is still standing. In the C.H.E.A.T. Code\u2122, capacity is multiplicative. One dimension at this level constrains everything else, regardless of how strong the others are. This is where you begin."}
function subInsight(section,scores){const items=section.questions.map(q=>({...q,score:scores[q.key]})).filter(q=>q.score!=null);if(items.length<2)return null;const sorted=[...items].sort((a,b)=>a.score-b.score);if(sorted[sorted.length-1].score-sorted[0].score<=1)return null;return{lowest:sorted[0],highest:sorted[sorted.length-1]}}
function getAction(h,scores){
  const rs=h.subKeys.filter(k=>scores[k]!=null).sort((a,b)=>scores[a]-scores[b]);
  const key=rs[0];if(!key)return h.actions._default.depleted||h.actions._default;
  const val=scores[key];
  const tier=val<=3?"critical":val<=6?"depleted":"resourced";
  const act=h.actions[key];
  if(typeof act==="string")return act;
  return(act&&act[tier])||h.actions._default[tier]||h.actions._default.depleted||""
}

  if(historySaved)return;
  const hist=loadHistory();
  const entry={date:new Date().toISOString(),scores:{...sc},sections:{energy:secScores.energy,attention:secScores.attention,time:secScores.time},composite:parseFloat(composite),timeframe:timeframe||"right_now"};
  // Don't save duplicates within 4 hours
  if(hist.length>0){const last=hist[hist.length-1];if(Math.abs(new Date(last.date)-new Date(entry.date))<14400000)return}
  hist.push(entry);
  if(hist.length>MAX_HISTORY)hist.splice(0,hist.length-MAX_HISTORY);
  try{localStorage.setItem(HISTORY_KEY,JSON.stringify(hist))}catch(e){}
  historySaved=true;
}

function formatDate(iso){const d=new Date(iso);return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}

// Share encoding: one char per score in canonical ALL_Q order. 0-9 = 0-9, 'a' = 10.
const SHARE_KEYS=ALL_Q.map(q=>q.key);
function encodeScores(sc){
  return SHARE_KEYS.map(k=>{const v=sc[k];if(v==null||v<0||v>10)return "-";return v===10?"a":String(v)}).join("");
}
function decodeScores(str){
  if(!str||str.length!==SHARE_KEYS.length)return null;
  const out={};
  for(let i=0;i<SHARE_KEYS.length;i++){
    const ch=str[i];
    let v;
    if(ch==="a"||ch==="A")v=10;
    else if(/^[0-9]$/.test(ch))v=parseInt(ch,10);
    else return null;
    out[SHARE_KEYS[i]]=v;
  }
  return out;
}

function renderTrendsCard(){
  const hist=loadHistory();
  if(hist.length<3)return"";
  const first=new Date(hist[0].date),last=new Date(hist[hist.length-1].date);
  const spanDays=Math.round((last-first)/(86400000));
  const spanLabel=spanDays<1?"today":spanDays<7?spanDays+" day"+(spanDays===1?"":"s"):spanDays<31?Math.round(spanDays/7)+" week"+(Math.round(spanDays/7)===1?"":"s"):Math.round(spanDays/30)+" month"+(Math.round(spanDays/30)===1?"":"s");
  const W=360,H=120,PAD=28,PB=18;
  const pts=hist.slice(-30);
  const xStep=(W-PAD*2)/Math.max(pts.length-1,1);
  function yPos(v){return PB+(H-PB*2)*(1-v/10)}
  function makeLine(data,color,dashed){
    if(data.length<2)return"";
    let d="M";
    data.forEach((v,i)=>{d+=(i?"L":"")+(PAD+i*xStep).toFixed(1)+","+yPos(v).toFixed(1)+" "});
    return`<path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"${dashed?' stroke-dasharray="4,3"':""}/>`;
  }
  const compLine=makeLine(pts.map(e=>e.composite),C.ember,false);
  const eLine=makeLine(pts.map(e=>e.sections.energy),C.green,true);
  const aLine=makeLine(pts.map(e=>e.sections.attention),C.amber,true);
  const tLine=makeLine(pts.map(e=>e.sections.time),C.red,true);
  let grid="";
  [2,4,6,8,10].forEach(v=>{
    const y=yPos(v);
    grid+=`<line x1="${PAD}" y1="${y}" x2="${W-PAD}" y2="${y}" stroke="rgba(138,134,130,0.1)" stroke-width="0.5"/>`;
    grid+=`<text x="${PAD-6}" y="${y+3}" text-anchor="end" fill="rgba(138,134,130,0.4)" font-size="8" font-family="DM Mono,monospace">${v}</text>`;
  });
  const lastPt=pts[pts.length-1];
  const dotX=PAD+(pts.length-1)*xStep,dotY=yPos(lastPt.composite);
  const dot=`<circle cx="${dotX}" cy="${dotY}" r="3.5" fill="${scoreColor(lastPt.composite)}" stroke="var(--bgCard)" stroke-width="1.5"/>`;
  const svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;margin-bottom:0.75rem">${grid}${tLine}${aLine}${eLine}${compLine}${dot}</svg>`;
  const legend=`<div style="display:flex;flex-wrap:wrap;gap:0.75rem;justify-content:center;margin-bottom:1rem"><span style="font-size:0.75rem;color:var(--ember)">\u2501 Overall</span><span style="font-size:0.75rem;color:${C.green}">\u254C Energy</span><span style="font-size:0.75rem;color:${C.amber}">\u254C Attention</span><span style="font-size:0.75rem;color:${C.red}">\u254C Time</span></div>`;
  const recent=pts.slice(-5);
  const older=pts.slice(0,Math.max(pts.length-5,1));
  const recentAvg=recent.reduce((s,e)=>s+e.composite,0)/recent.length;
  const olderAvg=older.reduce((s,e)=>s+e.composite,0)/older.length;
  const delta=recentAvg-olderAvg;
  let narrative="";
  if(Math.abs(delta)<0.3){
    narrative="Your capacity has been holding steady over the past "+spanLabel+". Stability is data too \u2014 it means your current habits are maintaining the system at this level.";
  }else if(delta>0){
    const magWord=delta>1.5?"significantly":"gradually";
    narrative="Your capacity has been "+magWord+" rising over the past "+spanLabel+". The practices are working. ";
    const dimDeltas=["energy","attention","time"].map(k=>{const rAvg=recent.reduce((s,e)=>s+(e.sections[k]||0),0)/recent.length;const oAvg=older.reduce((s,e)=>s+(e.sections[k]||0),0)/older.length;return{key:k,delta:rAvg-oAvg}}).sort((a,b)=>b.delta-a.delta);
    const driver=SECTIONS.find(s=>s.key===dimDeltas[0].key);
    if(dimDeltas[0].delta>0.5)narrative+=driver.label+" is leading the shift (+"+dimDeltas[0].delta.toFixed(1)+").";
  }else{
    const magWord=delta<-1.5?"significantly":"gradually";
    narrative="Your capacity has been "+magWord+" declining over the past "+spanLabel+". This isn\u2019t a verdict \u2014 it\u2019s signal. ";
    const dimDeltas=["energy","attention","time"].map(k=>{const rAvg=recent.reduce((s,e)=>s+(e.sections[k]||0),0)/recent.length;const oAvg=older.reduce((s,e)=>s+(e.sections[k]||0),0)/older.length;return{key:k,delta:rAvg-oAvg}}).sort((a,b)=>a.delta-b.delta);
    const drain=SECTIONS.find(s=>s.key===dimDeltas[0].key);
    if(dimDeltas[0].delta<-0.5)narrative+=drain.label+" is where the drop is sharpest ("+dimDeltas[0].delta.toFixed(1)+").";
  }
  return`<div class="card-lg" style="border-color:rgba(232,98,42,0.13)">
    <h2 class="label-sm">Trends Analysis</h2>
    <p style="font-size:0.8rem;color:var(--warmMuted);margin-bottom:0.75rem">${hist.length} audits over ${spanLabel}</p>
    ${svg}
    ${legend}
    <p style="font-size:0.95rem;color:var(--text);line-height:1.6">${narrative}</p>
  </div>`;
}

function downloadCalendarHolds(){

  const now=new Date();
  const y=now.getFullYear(),m=pad(now.getMonth()+1),d=pad(now.getDate());
  const stamp=y+m+d+'T'+pad(now.getHours())+pad(now.getMinutes())+pad(now.getSeconds());
  const times=[{h:'08',label:'Morning'},{h:'12',label:'Midday'},{h:'18',label:'Evening'}];
  let cal='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Rebellion Collective//Capacity Audit//EN\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n';
  times.forEach((t,i)=>{
    cal+='BEGIN:VEVENT\r\n';
    cal+='DTSTART:'+y+m+d+'T'+t.h+'0000\r\n';
    cal+='DTEND:'+y+m+d+'T'+t.h+'0500\r\n';
    cal+='RRULE:FREQ=DAILY\r\n';
    cal+='SUMMARY:Capacity Check-in ('+t.label+')\r\n';
    cal+='DESCRIPTION:Take 2 minutes. Notice where your energy\\, attention\\, and time are going.\\nhttps://capacityaudit.rebellioncollective.com\r\n';
    cal+='UID:capacity-audit-'+t.label.toLowerCase()+'-'+stamp+'@rebellioncollective.com\r\n';
    cal+='BEGIN:VALARM\r\nTRIGGER:-PT1M\r\nACTION:DISPLAY\r\nDESCRIPTION:Capacity Check-in\r\nEND:VALARM\r\n';
    cal+='END:VEVENT\r\n';
  });
  cal+='END:VCALENDAR';
  const blob=new Blob([cal],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='capacity-check-in.ics';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);

function downloadSpreadsheet(){

  var secScores={};
  SECTIONS.forEach(function(s){var vals=s.questions.map(function(q){return scores[q.key]}).filter(function(v){return v!=null});secScores[s.key]=vals.reduce(function(a,b){return a+b},0)/vals.length});
  var comp=((secScores.energy+secScores.attention+secScores.time)/3).toFixed(1);
  var summaryData=[
    ["C.H.E.A.T. Code Capacity Audit - Current Results"],
    ["Date",new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"})],
    ["Overall Score",parseFloat(comp)],
    ["Tier",scoreLabel(parseFloat(comp))],
    [],
    ["Dimension Averages"],
    ["Energy",parseFloat(secScores.energy.toFixed(1))],
    ["Attention",parseFloat(secScores.attention.toFixed(1))],
    ["Time",parseFloat(secScores.time.toFixed(1))],
    [],
    ["Individual Scores"]
  ];
  SECTIONS.forEach(function(s){s.questions.forEach(function(q){summaryData.push([q.label,scores[q.key]||0])})});
  var ws1=XLSX.utils.aoa_to_sheet(summaryData);
  ws1["!cols"]=[{wch:35},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws1,"Current Audit");
  // Sheet 2: Full History
  var headers=["Date","Overall","Tier","Energy","Attention","Time"];
  SECTIONS.forEach(function(s){s.questions.forEach(function(q){headers.push(q.label)})});
  var histData=[headers];
  hist.forEach(function(entry){
    var row=[new Date(entry.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"}),entry.composite,scoreLabel(entry.composite),parseFloat((entry.sections.energy||0).toFixed(1)),parseFloat((entry.sections.attention||0).toFixed(1)),parseFloat((entry.sections.time||0).toFixed(1))];
    SECTIONS.forEach(function(s){s.questions.forEach(function(q){row.push(entry.scores[q.key]||0)})});
    histData.push(row);
  });
  var ws2=XLSX.utils.aoa_to_sheet(histData);
  ws2["!cols"]=headers.map(function(h){return{wch:Math.max(h.length+2,12)}});
  XLSX.utils.book_append_sheet(wb,ws2,"Audit History");
  XLSX.writeFile(wb,"capacity-audit-data.xlsx");
}

  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>C.H.E.A.T. Code Results</title><style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Poppins',sans-serif;background:#0a0a0a;color:#ededed;padding:2rem;max-width:600px;margin:0 auto}h1{font-size:1.6rem;font-weight:600;margin-bottom:0.25rem;color:#fff}h2{font-size:1.2rem;font-weight:500;color:#f0864e;margin:1.5rem 0 0.5rem}.score{font-family:'DM Mono',monospace;font-size:3.5rem;font-weight:700;text-align:center;margin:1rem 0 0.25rem}.label{text-align:center;font-size:1rem;color:#ccc5bd;margin-bottom:0.25rem}.date{text-align:center;font-size:0.85rem;color:#8a8682;margin-bottom:1.5rem}.dim{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid #1a1a1a}.dim-name{font-weight:500}.dim-score{font-family:'DM Mono',monospace;font-weight:700}.insight{background:#161616;border-left:3px solid #e8622a;padding:1rem;margin:1rem 0;border-radius:0 6px 6px 0;line-height:1.6;font-size:0.95rem;color:#9a9692}.habit{background:#161616;padding:1rem;margin:0.5rem 0;border-radius:6px;border:1px solid rgba(232,98,42,0.1)}.habit-name{color:#f0864e;font-weight:500;margin-bottom:0.25rem}.habit-desc{color:#9a9692;font-size:0.9rem;line-height:1.5}.footer{text-align:center;margin-top:2rem;padding-top:1rem;border-top:1px solid #1a1a1a;font-size:0.8rem;color:#8a8682}.cta{text-align:center;margin:1.5rem 0;padding:1rem;background:#161616;border-radius:8px;border:1px solid rgba(232,98,42,0.15)}.cta a{color:#f0864e;text-decoration:none;font-weight:500}@media print{body{background:#fff;color:#111}h1,h2,.score{color:#111}.dim{border-color:#ddd}.insight,.habit{background:#f5f5f5;border-color:#e8622a}.habit-desc,.insight{color:#444}.footer{color:#999}.cta{background:#f5f5f5}}</style></head><body><h1>The C.H.E.A.T. Code\u2122 Capacity Audit</h1><div style="font-size:0.85rem;color:#8a8682;margin-bottom:1.5rem">Rebellion Collective \u00b7 rebellioncollective.com</div><div class="score" style="color:${scoreColor(parseFloat(comp))}">${comp}</div><div class="label">${scoreLabel(parseFloat(comp))} \u00b7 out of 10</div><div class="date">${dateStr}${tfLabel?" \u00b7 "+tfLabel:""}</div><h2>Dimension Breakdown</h2>${dims}<div style="margin-top:0.5rem"><strong style="color:#ccc5bd">Most Depleted:</strong> ${dimLabel} (${lowScore.toFixed(1)}/10)</div><h2>What Your Pattern Reveals</h2><div class="insight">${insight}</div><h2>Five Habits</h2>${habits}<div class="cta"><p style="margin-bottom:0.5rem">Ready to go deeper?</p><a href="https://rebellioncollective.com/application-form?utm_source=cheat_diagnostic_pdf">Book a Clarity Call</a> \u00b7 <a href="https://rebellioncollective.com/community?utm_source=cheat_diagnostic_pdf">Join the Rebellion Collective</a></div><div class="footer"><div>The C.H.E.A.T. Code\u2122 Capacity Audit \u00b7 Rebellion Collective</div><div style="margin-top:0.25rem;font-style:italic;color:#9a9692">Be rebellious.</div><div style="margin-top:0.5rem;font-size:0.75rem">This is a self-reflection tool, not a clinical assessment or substitute for professional care.</div></div></body></html>`;

// Parse ?r= param for shared view, otherwise normal flow.
(function bootFromURL(){
  try{
    const params=new URLSearchParams(window.location.search);
    const r=params.get("r");
    if(r){
      const decoded=decodeScores(r);
      if(decoded){scores=decoded;isShared=true;step=totalQ;return}
    }
  }catch(e){}
})();

function clipCopy(text,btn,label){
  const orig=btn.textContent;const origBg=btn.style.background;const origColor=btn.style.color;const origBorder=btn.style.border;
  const done=()=>{btn.textContent="Copied \u2014 paste anywhere to share";btn.style.background="var(--green)";btn.style.color="var(--bg)";btn.style.border="none";setTimeout(()=>{btn.textContent=orig;btn.style.background=origBg;btn.style.color=origColor;btn.style.border=origBorder},3000)};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>{prompt(label,text)});
  }else{
    const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();
    try{document.execCommand("copy");done()}catch(e){prompt(label,text)}
    document.body.removeChild(ta);
  }
}
function copyShareLink(btn){
  clipCopy(directURL(),btn,"Copy your link:");
}
function copyShareText(btn){
  const text="I just ran my C.H.E.A.T. Code\u2122 Capacity Audit. This is the shape my capacity is in right now. Curious what yours looks like. Take the free audit and learn how to reclaim yours.\n\nhttps://capacityaudit.rebellioncollective.com";
  clipCopy(text,btn,"Copy share text:");
}
function downloadShareCard(btn){
  const orig=btn.textContent;
  btn.textContent="Generating\u2026";
  const code=encodeScores(scores);
  const imgUrl=`${OG_HOST}/api/og?r=${code}`;
  fetch(imgUrl,{mode:"cors"}).then(r=>{if(!r.ok)throw new Error(r.status);return r.blob()}).then(blob=>{
    if(blob.size<500)throw new Error("empty");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="capacity-audit.png";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    btn.textContent="Downloaded \u2713";setTimeout(()=>{btn.textContent=orig},2000);
  }).catch(()=>{
    // Fallback: generate a canvas-based share card
    generateLocalShareCard().then(dataUrl=>{
      const a=document.createElement("a");a.href=dataUrl;a.download="capacity-audit.png";
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      btn.textContent="Downloaded \u2713";setTimeout(()=>{btn.textContent=orig},2000);
    }).catch(()=>{btn.textContent=orig});
  });
}
function generateLocalShareCard(){
  return new Promise((resolve,reject)=>{
    try{
      const c=document.createElement("canvas");c.width=1200;c.height=630;
      const ctx=c.getContext("2d");
      // Background
      ctx.fillStyle="#0a0a0a";ctx.fillRect(0,0,1200,630);
      // Border accent
      ctx.fillStyle="#e8622a";ctx.fillRect(0,0,1200,4);
      // Title
      ctx.fillStyle="#e8622a";ctx.font="600 16px sans-serif";ctx.letterSpacing="0.15em";
      ctx.fillText("REBELLION COLLECTIVE",60,60);
      ctx.fillStyle="#ffffff";ctx.font="600 36px sans-serif";ctx.letterSpacing="0";
      ctx.fillText("The C.H.E.A.T. Code\u2122 Capacity Audit",60,110);
      // Scores
      const secScores={};
      SECTIONS.forEach(s=>{const vals=s.questions.map(q=>scores[q.key]).filter(v=>v!=null);secScores[s.key]=vals.reduce((a,b)=>a+b,0)/vals.length});
      const comp=((secScores.energy+secScores.attention+secScores.time)/3).toFixed(1);
      // Composite score
      ctx.fillStyle=scoreColor(parseFloat(comp));ctx.font="700 120px monospace";
      ctx.fillText(comp,60,270);
      ctx.fillStyle="#ccc5bd";ctx.font="400 24px sans-serif";
      ctx.fillText(scoreLabel(parseFloat(comp))+" / 10",60,310);
      // Dimension scores
      let dy=370;
      SECTIONS.forEach(s=>{
        const sc=secScores[s.key];
        ctx.fillStyle="#ededed";ctx.font="500 20px sans-serif";
        ctx.fillText(s.icon+" "+s.label,60,dy);
        ctx.fillStyle=scoreColor(sc);ctx.font="700 20px monospace";
        ctx.fillText(sc.toFixed(1),350,dy);
        // Bar
        ctx.fillStyle="rgba(232,98,42,0.15)";ctx.fillRect(420,dy-14,500,16);
        ctx.fillStyle=scoreColor(sc);ctx.fillRect(420,dy-14,(sc/10)*500,16);
        dy+=40;
      });
      // Footer
      ctx.fillStyle="#8a8682";ctx.font="400 16px sans-serif";
      ctx.fillText("capacityaudit.rebellioncollective.com",60,590);
      ctx.fillStyle="#9a9692";ctx.font="italic 400 16px sans-serif";
      ctx.fillText("Be rebellious.",450,590);
      resolve(c.toDataURL("image/png"));
    }catch(e){reject(e)}
  });
}
function startOwnAudit(){
  isShared=false;scores={};step=-1;try{localStorage.removeItem("cheat_audit_session")}catch(e){}email="";emailSent=false;
  timeframe=null;showTimeframe=false;historyFilter="all";historySaved=false;
  try{history.replaceState(null,"",window.location.pathname)}catch(e){}
  render();window.scrollTo({top:0,behavior:"smooth"});
}

(function(){try{var s=localStorage.getItem("cheat_audit_session");if(s){var d=JSON.parse(s);if(d.scores&&Object.keys(d.scores).length===10){scores=d.scores;step=d.step||10}}}catch(e){}})();
render();
