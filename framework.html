<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>The C.H.E.A.T. Code&#8482; | How Capacity Actually Works</title><meta name="description" content="Capacity is a live equation. Explore the interactive model behind the C.H.E.A.T. Code framework from Rebellion Collective."><meta property="og:title" content="The C.H.E.A.T. Code™ | How Capacity Actually Works"><meta property="og:description" content="Capacity is a live equation. Explore the interactive model and see what shifts when you shift."><meta property="og:type" content="website"><meta property="og:image" content="https://capacityaudit.rebellioncollective.com/og-image.png"><meta property="og:url" content="https://rebellioncollective.com/capacity"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="The C.H.E.A.T. Code™ | How Capacity Actually Works"><meta name="twitter:description" content="Capacity is a live equation. Explore the interactive model."><meta name="twitter:image" content="https://capacityaudit.rebellioncollective.com/og-image.png"><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#e8ebe3;--bgCard:#f0f2ec;--ember:#3d5638;--emberLight:#3d5638;--warm:#2a3528;--warmMuted:#4a5244;--text:#1e2a1c;--textMuted:#3a4238;--red:#a8453a;--amber:#7d6e22;--green:#4a6444}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;width:100%}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
a{color:var(--emberLight);text-decoration:none}a:hover{text-decoration:underline}
a:focus-visible,button:focus-visible{outline:2px solid var(--ember);outline-offset:2px}
.mono{font-family:'DM Mono',monospace}

.wrap{max-width:660px;margin:0 auto;paddin:1.5rem 1.25rem 2.5rem;min-height:100vh;overflow-x:hidden;width:100%}
.section{animation:fadeIn 0.4s ease both;margin-bottom:2.5rem}
.card{background:var(--bgCard);border-radius:8px;padding:1.25rem;margin-bottom:0.75rem;border:1px solid rgba(74,100,68,0.09)}
.card-lg{background:var(--bgCard);border-radius:12px;padding:2rem 1.5rem;margin-bottom:1.5rem;border:1px solid rgba(74,100,68,0.13);box-shadow:0 1px 2px rgba(0,0,0,0.03)}
.label-sm{font-size:0.8rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--textMuted);margin-bottom:0.5rem;font-weight:400}
.btn{padding:1rem 2rem;font-family:'Poppins',sans-serif;font-size:1.1rem;font-weight:600;color:var(--bg);background:var(--ember);border:none;border-radius:8px;cursor:pointer;display:inline-block;text-decoration:none}
.btn:hover{opacity:0.9;text-decoration:none}
.btn-outline{padding:0.85rem 1.75rem;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:500;color:var(--emberLight);background:transparent;border:1px solid rgba(74,100,68,0.33);border-radius:8px;cursor:pointer;text-decoration:none;display:inline-block}
.btn-ghost{background:none;border:none;font-family:'Poppins',sans-serif;color:var(--warmMuted);cursor:pointer;text-decoration:underline;font-size:0.85rem}
.skip-link{position:absolute;top:-50px;left:0;background:var(--ember);color:var(--bg);padding:8px 16px;z-index:100;font-size:0.9rem;border-radius:0 0 4px 0;transition:top 0.2s}.skip-link:focus{top:0}

/* Equation display */
.equation-wrap{text-align:center;padding:1.5rem 0}
.eq{font-family:'DM Mono',monospace;font-size:1.8rem;font-weight:700;color:var(--warm);line-height:1.6}
.eq-dim{display:inline-block;transition:color 0.3s ease}
.eq-op{color:var(--warmMuted);font-weight:400;margin:0 0.15rem}
.eq-result{font-size:2.2rem;color:var(--ember)}

/* Slider tracks */
.track{position:relative;height:10px;background:rgba(74,100,68,0.12);border-radius:5px;margin-bottom:0.75rem;touch-action:none}
.track-fill{position:absolute;left:0;top:0;height:100%;border-radius:5px;transition:width 0.08s linear,background 0.2s ease}
.thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;border:2px solid var(--bg);pointer-events:none;transition:left 0.08s linear,background-color 0.2s ease,box-shadow 0.2s ease}
input[type="range"]{-webkit-appearance:none;appearance:none;background:transparent;position:absolute;width:100%;height:56px;top:-23px;left:0;opacity:0;cursor:pointer;margin:0;touch-action:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:36px;height:36px;cursor:pointer;background:transparent;border-radius:50%}
input[type="range"]:focus{outline:none}

/* Quality layer toggles */
.quality-row{display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap}
.q-toggle{padding:0.5rem 1rem;border-radius:6px;font-size:0.85rem;font-family:inherit;cursor:pointer;border:1px solid rgba(74,100,68,0.2);background:transparent;color:var(--textMuted);transition:all 0.2s ease;min-height:44px;min-width:44px}
.q-toggle.active{background:var(--ember);color:var(--bg);border-color:var(--ember)}
.q-toggle:hover{border-color:var(--ember)}

/* Multiplier visualization */
.mult-viz{display:flex;align-items:center;gap:0.5rem;justify-content:center;padding:1rem 0;flex-wrap:wrap}
.mult-box{width:80px;height:80px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.3s ease;border:2px solid rgba(74,100,68,0.15)}
.mult-box .val{font-family:'DM Mono',monospace;font-size:1.5rem;font-weight:700;line-height:1}
.mult-box .lbl{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;margin-top:0.2rem;opacity:0.7}
.mult-op{font-family:'DM Mono',monospace;font-size:1.5rem;color:var(--warmMuted);font-weight:400}
.mult-result{width:90px;height:90px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid var(--ember);transition:all 0.3s ease}
.mult-result .val{font-family:'DM Mono',monospace;font-size:1.8rem;font-weight:700;line-height:1}
.mult-result .lbl{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;margin-top:0.2rem}

/* 5 C's downstream */
.five-c-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0.5rem;text-align:center}
.five-c-item{padding:0.75rem 0.25rem;border-radius:8px;border:1px solid rgba(74,100,68,0.12);transition:all 0.3s ease;background:var(--bgCard)}
.five-c-item .icon{font-size:1.3rem;margin-bottom:0.25rem}
.five-c-item .name{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.five-c-item.dim{opacity:0.35}

/* Flow arrow */
.flow-arrow{text-align:center;font-size:1.3rem;color:var(--warmMuted);padding:0.5rem 0;opacity:0.5}

/* Scenario presets */
.scenario-row{display:grid;grid-template-columns:repeat(5,1fr);gap:0.4rem;margin-bottom:1rem}
.scenario-btn{padding:0.5rem 0.5rem;border-radius:6px;font-size:0.78rem;font-family:inherit;cursor:pointer;border:1px solid rgba(74,100,68,0.2);background:transparent;color:var(--textMuted);transition:all 0.2s ease;min-height:44px;text-align:center;line-height:1.2;white-space:nowrap}
.scenario-btn:hover{border-color:var(--ember);color:var(--ember)}
.scenario-btn.active{background:var(--ember);color:var(--bg);border-color:var(--ember)}
@media(max-width:560px){.scenario-row{grid-template-columns:repeat(2,1fr)}.scenario-btn{white-space:normal}}

@media(max-width:500px){
  .eq{font-size:1.3rem}
  .eq-result{font-size:1.6rem}
  .mult-box{width:65px;height:65px}
  .mult-box .val{font-size:1.2rem}
  .mult-result{width:75px;height:75px}
  .mult-result .val{font-size:1.4rem}
  .practice-grid{grid-template-columns:repeat(3,1fr)}
  .card-lg{padding:1.25rem 1rem}
}
.practice-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0.5rem;text-align:center;margin-bottom:1rem}
.practice-item{padding:0.75rem 0.25rem;border-radius:8px;border:1px solid rgba(74,100,68,0.12);background:var(--bgCard);cursor:pointer;transition:all 0.3s ease;font-family:inherit;min-height:44px;min-width:44px}
.practice-item:hover{border-color:var(--ember)}
.practice-item.active{background:var(--ember);color:var(--bg);border-color:var(--ember)}
.practice-item .icon{font-size:1.3rem;margin-bottom:0.25rem}
.practice-item .name{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}


.bonus-tag{font-size:0.75rem;color:var(--green);font-weight:500;margin-left:0.25rem}

/* ── Section 7: V.O.I.D. ── */
.void-eq-wrap{text-align:center;padding:1rem 0}
.void-eq{font-family:'DM Mono',monospace;font-size:1.6rem;font-weight:700;color:var(--red);line-height:1.6}
.void-eq-op{color:var(--warmMuted);font-weight:400;margin:0 0.35rem}
.void-eq-sub{font-size:0.8rem;color:var(--warmMuted);margin-top:0.4rem}
.void-force-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:1rem}
.void-force-card{background:var(--bgCard);border:1px solid rgba(74,100,68,0.12);border-radius:8px;padding:0.85rem 1rem;display:grid;grid-template-columns:36px 1fr auto;gap:0.85rem;align-items:center}
.void-force-card .letter{font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--red);text-align:center}
.void-force-card .body .name{font-weight:600;font-size:0.92rem;color:var(--warm)}
.void-force-card .body .attacks{font-size:0.72rem;color:var(--textMuted);text-transform:uppercase;letter-spacing:0.1em;margin-top:0.1rem}
.void-force-card .pressure{font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:600;color:var(--red);opacity:0.85;min-width:38px;text-align:right;transition:opacity 0.2s ease}
.void-iso-row{display:flex;gap:0.5rem;margin-top:0.75rem;flex-wrap:wrap}
.void-iso-toggle{padding:0.5rem 1rem;border-radius:6px;font-size:0.85rem;font-family:inherit;cursor:pointer;border:1px solid rgba(74,100,68,0.2);background:transparent;color:var(--textMuted);transition:all 0.2s ease;min-height:44px;flex:1}
.void-iso-toggle.active{background:var(--ember);color:var(--bg);border-color:var(--ember)}
.void-iso-toggle.alone.active{background:var(--red);border-color:var(--red)}
.void-collective-note{margin-top:1.5rem;padding:1rem 1.15rem;border-left:3px solid var(--ember);background:rgba(61,86,56,0.06);border-radius:4px}
.void-collective-note p{font-size:0.92rem;color:var(--warm);line-height:1.6;margin:0}
.void-collective-note p + p{margin-top:0.5rem;color:var(--textMuted);font-style:italic;font-size:0.85rem}
@media(max-width:520px){.void-force-grid{grid-template-columns:1fr}}

/* ── Explore the Model: sub-cards ── */
.sub-card{background:rgba(255,255,255,0.45);border:1px solid rgba(74,100,68,0.10);border-radius:10px;padding:1.25rem 1.15rem;margin-top:1rem}
.sub-card:first-of-type{margin-top:1.25rem}
.sub-card .sub-title{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.18em;color:var(--ember);font-weight:600;margin-bottom:0.75rem}
.sub-card .sub-lead{font-size:0.92rem;color:var(--textMuted);line-height:1.6;margin-bottom:1rem}
.practice-item .name{overflow:visible;white-space:normal;word-break:break-word}
</style>

<body>
<a href="#main" class="skip-link">Skip to content</a>
<main id="main">
<div class="wrap" id="app"></div>
</main>

<script>
// ── Color + scoring utilities (shared with audit) ──
const C={bg:"#e8ebe3",bgCard:"#f0f2ec",ember:"#3d5638",emberLight:"#3d5638",warm:"#2a3528",warmMuted:"#4a5244",text:"#1e2a1c",textMuted:"#3a4238",red:"#a8453a",amber:"#7d6e22",green:"#4a6444"};
function scoreColor(s){return s<=3?C.red:s<=6?C.amber:C.green}
function scoreLabel(s){return s<=2?"Critical":s<=4?"Depleted":s<=6?"Stretched":s<=8?"Steady":"Thriving"}

// ── State ──
const state={
  energy:5, attention:5, time:5,
  habits:"conscious", // conscious | unconscious
  scenario:null,
  practices:{curiosity:false,courage:false,compassion:false,connection:false,commitment:false},
  fromAudit:false,
  auditScores:null
};

// ── Parse URL params (Phase 3 hook: accept scores from audit) ──
(function parseParams(){
  const p=new URLSearchParams(window.location.search);
  const e=parseFloat(p.get("e")), a=parseFloat(p.get("a")), t=parseFloat(p.get("t"));
  if(!isNaN(e)&&!isNaN(a)&&!isNaN(t)){
    state.energy=Math.max(0,Math.min(10,e));
    state.attention=Math.max(0,Math.min(10,a));
    state.time=Math.max(0,Math.min(10,t));
    state.fromAudit=true;
    state.auditScores={energy:state.energy,attention:state.attention,time:state.time};
  }
})();

// ── Practice Toggles ──
function togglePractice(key){
  state.practices[key]=!state.practices[key];
  updatePractices();
  ["energy","attention","time"].forEach(function(dim){
    var bonusEl=document.getElementById("sl-bonus-"+dim);
    if(bonusEl){var b=totalPracticeBonus(dim);bonusEl.textContent=b>0?" +"+b.toFixed(1):""}
  });
  updateMultViz();
  // Section 4 (V.O.I.D.) reacts to practice toggles
  if(typeof voidUpdate === 'function') voidUpdate();
}

// ── Scenarios ──
const SCENARIOS={
  balanced:{label:"Balanced",e:7,a:7,t:7,desc:"All three steady. Notice how even decent, even numbers add up to solid capacity. You do not need to be peak in any one of them."},
  burnout:{label:"Burnout",e:3,a:4,t:2,desc:"Time is gone. Energy is crashing. Attention is just trying to survive. One low number drags the whole thing down. This is what running on fumes actually does to the math."},
  hyperfocus:{label:"Hyperfocus Trap",e:4,a:9,t:3,desc:"Attention is locked in. But the cost is showing up in the other two. Willpower alone cannot hold this together for long."},
  sunday:{label:"Sunday Reset",e:8,a:6,t:8,desc:"Good rest. Time back in your hands. Attention still waking up. This is what recovery feels like before it lands."},
  flow:{label:"Flow State",e:8,a:9,t:7,desc:"Attention is locked in, and Energy and Time can keep up with it. The work feels alive. Hours pass without you noticing. This is what high focus looks like when it is not costing you."},
  custom:{label:"Custom",e:null,a:null,t:null,desc:"Set your own numbers and see what happens."}
};

// ── Practice Effects ──
const PRACTICE_EFFECTS={curiosity:{attention:2.0},courage:{time:2.0},compassion:{energy:2.0},connection:{energy:1.0,attention:1.0},commitment:{time:1.0,attention:1.0}};
function getEffective(dim){var base=state[dim],bonus=0;Object.keys(state.practices).forEach(function(p){if(state.practices[p]&&PRACTICE_EFFECTS[p]&&PRACTICE_EFFECTS[p][dim]){bonus+=PRACTICE_EFFECTS[p][dim]}});return Math.min(10,base+bonus)}
function totalPracticeBonus(dim){var bonus=0;Object.keys(state.practices).forEach(function(p){if(state.practices[p]&&PRACTICE_EFFECTS[p]&&PRACTICE_EFFECTS[p][dim]){bonus+=PRACTICE_EFFECTS[p][dim]}});return bonus}

// ── Compute ──
function computeCapacity(){var e=getEffective("energy"),a=getEffective("attention"),t=getEffective("time");return parseFloat(Math.pow(e*a*t,1/3).toFixed(1))}

function computeRawGM(){var e=getEffective("energy"),a=getEffective("attention"),t=getEffective("time");return parseFloat(Math.pow(e*a*t,1/3).toFixed(1))}

// ── Render ──
function render(){
  const gm=computeRawGM();
  const cap=computeCapacity();
  const app=document.getElementById("app");

  app.innerHTML=`
    <!-- Header -->
    <div class="section" style="text-align:center;padding-top:1.5rem">
      <p class="label-sm" style="margin-bottom:0.75rem">The C.H.E.A.T. Code&#8482;</p>
      <h1 style="font-size:1.7rem;font-weight:700;line-height:1.3;color:var(--warm);margin-bottom:0.75rem">How Capacity Actually Works</h1>
      <p style="font-size:1rem;color:var(--textMuted);line-height:1.6;max-width:520px;margin:0 auto">
        ${state.fromAudit
          ? "Your audit scores are loaded below. This is the math behind your number, and what you can shift to change it."
          : "Capacity is your mental, physical, or emotional power to do or understand something. It is a finite resource, but you have more control over it than you may think."}
      </p>
      ${state.fromAudit ? "" : `
      <div style="margin-top:1.5rem">
        <a href="https://capacityaudit.rebellioncollective.com/" class="btn" style="text-decoration:none">Take The Capacity Audit</a>
      </div>
      `}
    </div>

    <!-- Section 1: The Equation -->
    <div class="section">
      <div class="card-lg">
        <h2 class="label-sm" style="font-size:0.9rem;margin-bottom:0.5rem">The Cheat Code</h2>
        <p style="font-size:0.95rem;color:var(--textMuted);line-height:1.6;margin-bottom:1rem">Three things make up your capacity. Energy. Attention. Time.</p>
        <p style="font-size:0.95rem;color:var(--textMuted);line-height:1.6;margin-bottom:1rem">They are multiplicative. If any one of them drops to zero, your capacity collapses.</p>
        <div class="equation-wrap">
          <div class="eq">
            <span style="font-size:0.85em;font-weight:400">C</span><span style="font-size:0.65em;font-weight:400;vertical-align:sub">(h)</span>
            <span class="eq-op">=</span>
            <span class="eq-dim" id="eq-e" style="color:${scoreColor(getEffective('energy'))}">E</span>
            <span class="eq-op">&times;</span>
            <span class="eq-dim" id="eq-a" style="color:${scoreColor(getEffective('attention'))}">A</span>
            <span class="eq-op">&times;</span>
            <span class="eq-dim" id="eq-t" style="color:${scoreColor(getEffective('time'))}">T</span>
          </div>
          <div style="font-size:0.8rem;color:var(--warmMuted);margin-top:0.5rem">
            Capacity, shaped by your Habits = Energy &times; Attention &times; Time
          </div>
        </div>
      </div>
    </div>

    <!-- Section 2: Explore the Model (unified: capacity + drain + practices) -->
    <div class="section">
      <div class="card-lg" id="model-card">
        <h2 class="label-sm" style="font-size:0.9rem;margin-bottom:0.25rem">Explore The Cheat Code</h2>
        <p style="font-size:0.95rem;color:var(--textMuted);line-height:1.55;margin-bottom:1.25rem">One model, three views. Set your numbers, watch what drains your capacity, and what rebuilds it.</p>

        ${state.fromAudit?`<div style="font-size:0.8rem;color:var(--warmMuted);margin-bottom:1rem;padding:0.5rem 0.75rem;background:rgba(74,100,68,0.04);border-radius:6px">Loaded from your audit: E=${state.auditScores.energy.toFixed(1)}, A=${state.auditScores.attention.toFixed(1)}, T=${state.auditScores.time.toFixed(1)}</div>`:""}

        <!-- Scenario presets -->
        <div style="margin-bottom:1.25rem">
          <div style="font-size:0.8rem;color:var(--warmMuted);margin-bottom:0.5rem">Try a scenario:</div>
          <div class="scenario-row">
            ${Object.entries(SCENARIOS).map(([k,v])=>{
              if(k==="custom") return "";
              return `<button class="scenario-btn${state.scenario===k?" active":""}" onclick="loadScenario('${k}')">${v.label}</button>`;
            }).join("")}
          </div>
          <div id="scenario-desc" style="font-size:0.9rem;color:var(--textMuted);line-height:1.55;min-height:2em">${state.scenario&&SCENARIOS[state.scenario]?SCENARIOS[state.scenario].desc:"Pick a scenario above to see how different patterns shape the equation."}</div>
        </div>

        <!-- Sub-card 1: Your Capacity -->
        <div class="sub-card">
          <div class="sub-title">Your Capacity</div>
          <p class="sub-lead">Move any of the three and watch what happens. Pay attention to what one low number does to the rest.</p>

          ${renderSlider("energy","Energy","⚡",state.energy)}
          ${renderSlider("attention","Attention","🎯",state.attention)}
          ${renderSlider("time","Time","⏱️",state.time)}

          <div class="mult-viz" id="mult-viz" style="margin-top:1.25rem">
            <div class="mult-box" style="border-color:${scoreColor(getEffective('energy'))}30">
              <div class="val" style="color:${scoreColor(getEffective('energy'))}">${getEffective('energy').toFixed(1)}</div>
              <div class="lbl">Energy</div>
            </div>
            <div class="mult-op">&times;</div>
            <div class="mult-box" style="border-color:${scoreColor(getEffective('attention'))}30">
              <div class="val" style="color:${scoreColor(getEffective('attention'))}">${getEffective('attention').toFixed(1)}</div>
              <div class="lbl">Attn</div>
            </div>
            <div class="mult-op">&times;</div>
            <div class="mult-box" style="border-color:${scoreColor(getEffective('time'))}30">
              <div class="val" style="color:${scoreColor(getEffective('time'))}">${getEffective('time').toFixed(1)}</div>
              <div class="lbl">Time</div>
            </div>
            <div class="mult-op">=</div>
            <div class="mult-result" style="border-color:${scoreColor(gm)}">
              <div class="val" id="gm-display" style="color:${scoreColor(gm)}">${gm.toFixed(1)}</div>
              <div class="lbl">Capacity</div>
            </div>
          </div>

          <div style="text-align:center;margin-top:0.25rem">
            <div id="tier-display" style="font-size:1rem;font-weight:600;color:var(--warm)">${scoreLabel(gm)}</div>

// ── Slider renderer ──
function renderSlider(key, label, icon, val){
  const pct=(val/10)*100;
  const col=scoreColor(val);
  return `<div style="margin-bottom:1.25rem">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.3rem">
      <span style="font-size:1rem;font-weight:600"><span aria-hidden="true">${icon}</span> ${label}</span>
      <span class="mono" id="sl-val-${key}" style="font-size:1.1rem;font-weight:700;color:${col}">${val.toFixed(1)}</span><span class="bonus-tag" id="sl-bonus-${key}">${(function(){var b=totalPracticeBonus(key);return b>0?" +"+b.toFixed(1):""}())}</span>
    </div>
    <div style="position:relative;height:10px;margin-bottom:0.15rem">
      <div class="track" style="margin-bottom:0">
        <div class="track-fill" id="sl-fill-${key}" style="width:${pct}%;background:${col}"></div>
        <div class="thumb" id="sl-thumb-${key}" style="left:${pct}%;background:${col};box-shadow:0 1px 4px rgba(0,0,0,0.18)"></div>
      </div>
      <input type="range" min="0" max="10" step="0.5" value="${val.toFixed(1)}" aria-label="${label} score" oninput="onSlide('${key}',this.value)" style="top:-23px">
    </div>
    <div style="display:flex;justify-content:space-between;font-size:0.7rem;color:var(--warmMuted)"><span>0</span><span>10</span></div>
  </div>`;
}

// ── Slider handler (optimized: no full re-render) ──
function onSlide(key, val){
  val=parseFloat(val);
  state[key]=val;
  state.scenario=null; // clear active scenario on manual slide

  // Update slider visual
  const el=document.getElementById("sl-val-"+key);
  const fill=document.getElementById("sl-fill-"+key);
  const thumb=document.getElementById("sl-thumb-"+key);
  const col=scoreColor(val);
  if(el){el.textContent=val.toFixed(1);el.style.color=col}
  if(fill){fill.style.width=(val/10)*100+"%";fill.style.background=col}
  if(thumb){thumb.style.left=(val/10)*100+"%";thumb.style.background=col}

  // Update bonus tag
  var bonusEl=document.getElementById("sl-bonus-"+key);
  if(bonusEl){var b=totalPracticeBonus(key);bonusEl.textContent=b>0?" +"+b.toFixed(1):""}
  // Update equation letters (using effective color)
  var effCol=scoreColor(getEffective(key));
  const eqEl=document.getElementById("eq-"+key.charAt(0));
  if(eqEl) eqEl.style.color=effCol;

  // Update multiplier viz
  updateMultViz();
  updatePractices();
  updateScenarioButtons();

  // V.O.I.D. (Section 7) reacts to live slider changes
  if(typeof voidUpdate === 'function') voidUpdate();
}

function updateMultViz(){
  const gm=computeRawGM();
  const cap=computeCapacity();
  const viz=document.getElementById("mult-viz");
  if(!viz) return;

  const dims=[
    {key:"energy",label:"Energy",val:getEffective("energy")},
    {key:"attention",label:"Attn",val:getEffective("attention")},
    {key:"time",label:"Time",val:getEffective("time")}
  ];

  let html="";
  dims.forEach((d,i)=>{
    html+=`<div class="mult-box" style="border-color:${scoreColor(d.val)}30">
      <div class="val" style="color:${scoreColor(d.val)}">${d.val.toFixed(1)}</div>
      <div class="lbl">${d.label}</div>
    </div>`;
    if(i<2) html+=`<div class="mult-op">&times;</div>`;
  });
  html+=`<div class="mult-op">=</div>
    <div class="mult-result" style="border-color:${scoreColor(gm)}">
      <div class="val" id="gm-display" style="color:${scoreColor(gm)}">${gm.toFixed(1)}</div>
      <div class="lbl">Capacity</div>
    </div>`;
  viz.innerHTML=html;

  const tierEl=document.getElementById("tier-display");
  const noteEl=document.getElementById("tier-note");
  if(tierEl) tierEl.textContent=scoreLabel(gm);
  if(noteEl) noteEl.textContent=getTierNote(gm);

  // Update compact readout in Go Deeper (mirrors capacity + tier)
  const compactCap=document.getElementById("compact-cap");
  const compactTier=document.getElementById("compact-tier");
  if(compactCap){
    compactCap.textContent=gm.toFixed(1);
    compactCap.style.color=scoreColor(gm);
  }
  if(compactTier) compactTier.textContent=scoreLabel(gm);

  // Update habits section
  updateHabitsDisplay();
}

function updateHabitsDisplay(){
  // This just needs the habit calc line to stay current
  // We'll do a targeted update if the elements exist
}

function updatePractices(){
  var grid=document.getElementById("practices-grid");
  var note=document.getElementById("practice-note");
  if(grid) grid.innerHTML=renderPractices();
  if(note) note.textContent=getPracticeNote()}

function updateScenarioButtons(){
  document.querySelectorAll(".scenario-btn").forEach(btn=>{
    btn.classList.remove("active");
  });
}

// ── Habits toggle ──
function setHabits(mode){
  state.habits=mode;
  // Targeted update: only update habits section elements
  document.querySelectorAll('.q-toggle').forEach(btn=>{
    const isConscious=btn.textContent.trim().startsWith('Chosen');
    const isActive=(mode==='conscious'&&isConscious)||(mode==='unconscious'&&!isConscious);
    btn.classList.toggle('active',isActive);
  });
  const desc=document.getElementById('habits-desc');
  if(desc){
    const p=desc.querySelector('p');
    if(p) p.textContent=mode==="conscious"
      ?"Chosen habits are the ones you have actually thought about. They line up with what you want. Your Energy, Attention, and Time go where you mean for them to go."
      :"Habits on autopilot are inherited. Reactive. Running by default. Your Energy gets spent on coping. Your Attention gets grabbed. Your Time fills with obligations you never agreed to. Same raw capacity. Very different result.";
  }
}

// ── Practice Toggles ──
function togglePractice(key){
  state.practices[key]=!state.practices[key];
  updatePractices();
  ["energy","attention","time"].forEach(function(dim){
    var bonusEl=document.getElementById("sl-bonus-"+dim);
    if(bonusEl){var b=totalPracticeBonus(dim);bonusEl.textContent=b>0?" +"+b.toFixed(1):""}
  });
  updateMultViz();
  // Section 4 (V.O.I.D.) reacts to practice toggles
  if(typeof voidUpdate === 'function') voidUpdate();
}

// ── Scenarios ──
function loadScenario(key){
  const s=SCENARIOS[key];
  if(!s||s.e===null) return;
  Object.keys(state.practices).forEach(function(p){state.practices[p]=false});
  state.energy=s.e;
  state.attention=s.a;
  state.time=s.t;
  state.scenario=key;
  render();
}

function resetToAudit(){
  if(!state.auditScores) return;
  state.energy=state.auditScores.energy;
  state.attention=state.auditScores.attention;
  state.time=state.auditScores.time;
  state.scenario=null;
  render();
}

// ── 5 C's rendering ──
function renderPractices(){var ps=[{key:"curiosity",name:"Curiosity",icon:"\u{1F50D}"},{key:"courage",name:"Courage",icon:"\u{1F525}"},{key:"compassion",name:"Compassion",icon:"\u{1F49A}"},{key:"connection",name:"Connection",icon:"\u{1F91D}"},{key:"commitment",name:"Commitment",icon:"\u26A1"}];return ps.map(function(p){var active=state.practices[p.key];return '<button class="practice-item'+(active?' active':'')+'" onclick="togglePractice(\''+p.key+'\')" aria-pressed="'+active+'">'+'<div class="icon" aria-hidden="true">'+p.icon+'</div>'+'<div class="name">'+p.name+'</div>'+'</button>'}).join("")}

function getPracticeNote(){var count=Object.values(state.practices).filter(Boolean).length;if(count===0) return "";if(count<=2) return count+" practice"+(count>1?"s":"")+" active. Notice how it lifts your capacity and eases the matching force.";if(count<=4) return count+" practices active. The effects add up. This is what rebuilding looks like.";return "All five practices active. This is the full move. Awareness in motion."}

function getTierNote(gm){
  if(gm<=2) return "The system is taking more than you can restore. This is where things start collapsing.";
  if(gm<=4) return "Running on reserves. Still functional, but it is costing you somewhere you might not see yet.";
  if(gm<=6) return "Getting by, but stretched. There is room here, but some adjustments need to be made to not fall into critical.";
  if(gm<=8) return "Steady. What you are putting in is keeping pace with what you put out. The work now is protecting what is working.";
  return "Thriving. Rare and worth noticing. This is what real capacity feels like.";
}

// ── Init ──
render();
// ── Section 4: V.O.I.D. (namespaced to avoid collisions) ──
const voidState = { alone: true };
// Each force has a primary target (the dimension it hits hardest) plus
// weighted contributions from all three. The page now teaches truthfully:
// every force responds to every slider, weighted heaviest at its primary.
// Weights for each force sum to 1.0 across {energy, attention, time}.
const voidForces = [
  { key:'V', name:'Volatility',  primary:'Time',         weights:{ energy:0.2, attention:0.2, time:0.6 } },
  { key:'O', name:'Overwhelm',   primary:'Energy',       weights:{ energy:0.6, attention:0.2, time:0.2 } },
  { key:'I', name:'Isolation',   primary:'Habits',       weights:{ energy:0.4, attention:0.3, time:0.3 } },
  { key:'D', name:'Distraction', primary:'Attention',    weights:{ energy:0.2, attention:0.6, time:0.2 } }
];
// Each practice eases the force it counters. Values are subtracted from pressure.
// Connection includes a small relief on Overwhelm because co-regulation calms the system.
const PRACTICE_DAMPEN = {
  curiosity:  { D: 2.0 },
  courage:    { V: 1.5 },
  compassion: { O: 2.0 },
  connection: { I: 2.0, O: 0.5 },
  commitment: { V: 1.0, D: 0.5 }
};
function voidTotalDampen(forceKey){
  var total = 0;
  Object.keys(state.practices).forEach(function(p){
    if(state.practices[p] && PRACTICE_DAMPEN[p] && PRACTICE_DAMPEN[p][forceKey]){
      total += PRACTICE_DAMPEN[p][forceKey];
    }
  });
  return total;
}
function voidPressure(f){
  const amp = voidState.alone ? 1.4 : 1.0;
  // Weighted blend across all three sliders. Each force feels every slider,
  // but is most sensitive to its primary.
  const w = f.weights;
  const blend = (state.energy * w.energy) + (state.attention * w.attention) + (state.time * w.time);
  var raw = (10 - blend) * 0.9 * amp;
  // Isolation also gets an additional bump from being alone (the (i) condition).
  if(f.key === 'I' && voidState.alone) raw += 1.5;
  raw -= voidTotalDampen(f.key);
  return Math.max(0, Math.min(10, raw));
}
function voidRenderForces(){
  const grid = document.getElementById('void-force-grid');
  if(!grid) return;
  grid.innerHTML = voidForces.map(function(f){
    return '<div class="void-force-card">'
      +'<div class="letter">'+f.key+'</div>'
      +'<div class="body"><div class="name">'+f.name+'</div>'
      +'<div class="attacks">primarily attacks '+f.primary+'</div></div>'
      +'<div class="pressure">'+voidPressure(f).toFixed(1)+'</div>'
    +'</div>';
  }).join('');
}
function voidUpdate(){ voidRenderForces(); }
function voidSetIsolation(mode){
  voidState.alone = (mode === 'alone');
  var aloneBtn = document.getElementById('void-on-own');
  var withBtn  = document.getElementById('void-with-others');
  var desc     = document.getElementById('void-iso-desc');
  if(aloneBtn) aloneBtn.classList.toggle('active',  voidState.alone);
  if(withBtn)  withBtn.classList.toggle('active', !voidState.alone);
  if(desc) desc.textContent = voidState.alone
    ? 'When you are on your own with it, the other three forces hit harder. All at once. With no one to help you catch them.'
    : 'When you have support, the forces still hit. The difference is you have help carrying the load.';
  voidRenderForces();
}
// initial render after page mounts
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', voidRenderForces);
} else {
  setTimeout(voidRenderForces, 0);
}
